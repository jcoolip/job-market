<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Skills</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style2.css') }}">
</head>
<body>
    <div class="skills-card">
        <div class="skills-list">
            {% for skill in skills %}
                <span class="skill">
                    <a href="{{ url_for('skills_jobs', skill_name=skill) }}">{{ skill }}</a>
                </span>
            {% endfor %}
        </div>
    </div>
</body>
</html>
