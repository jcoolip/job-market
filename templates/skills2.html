<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Skillssss</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        {% include "css.html" %}
    </head>
    <body>
        <div class="skills-card">
            <div class="skills-list">
                {% for skill in skills %}
                <div class="skill">
                    <a href="{{ url_for('skills_jobs', skill_name=skill) }}"
                        >{{ skill }}</a
                    ><br />
                    {% endfor %}
                </div>
            </div>
        </div>
    </body>
</html>
